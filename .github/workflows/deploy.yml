name: CI/CD to AWS EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            rm -rf cicd-demo
            git clone https://github.com/<your-username>/cicd-aws-demo.git
            cd cicd-aws-demo
            docker stop cicd-app || true
            docker rm cicd-app || true
            docker build -t cicd-app .
            docker run -d --name cicd-app -p 8081:80 cicd-app
